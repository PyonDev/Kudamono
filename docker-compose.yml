version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: kudamono-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: /kudamono-service
      dockerfile: Dockerfile
    container_name: kudamono-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/kudamono

  frontend:
    build:
      context: /kudamono-ui
      dockerfile: Dockerfile
    container_name: kudamono-ui
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080

volumes:
  mongo-data: